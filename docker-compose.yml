services:
  mysql:
    image: mysql:8
    container_name: scheduling-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: dev
      MYSQL_DATABASE: scheduling
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev
    command:
      - --lower_case_table_names=1
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "dev", "-pdev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scheduling-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # DB_HOST is overridden here so the backend container reaches MySQL via
      # the compose service name rather than localhost. The reviewer's .env
      # (with DB_HOST=localhost) stays valid for running the backend on host.
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: dev
      DB_PASSWORD: dev
      DB_DATABASE: scheduling
      PORT: 4000
      NODE_ENV: production
    ports:
      - "4000:4000"

volumes:
  mysql_data:
