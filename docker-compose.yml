services:
  mysql:
    image: mysql:8
    container_name: scheduling-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: dev
      MYSQL_DATABASE: scheduling
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev
    command:
      - --lower_case_table_names=1
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "dev", "-pdev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scheduling-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # DB_HOST is overridden here so the backend container reaches MySQL via
      # the compose service name rather than localhost. The reviewer's .env
      # (with DB_HOST=localhost) stays valid for running the backend on host.
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: dev
      DB_PASSWORD: dev
      DB_DATABASE: scheduling
      PORT: 4000
      NODE_ENV: production
      # The browser-side frontend lives on http://localhost:3000 (the
      # published port of the frontend container). The backend treats it
      # as a trusted origin so cross-origin fetches succeed.
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # The browser-side fetch from the user's host needs the API on
        # localhost:4000 (backend's published port), not the in-network
        # service name. NEXT_PUBLIC_* gets inlined at build time, so it
        # has to be passed as a build arg, not a runtime env.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    container_name: scheduling-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  mysql_data:
